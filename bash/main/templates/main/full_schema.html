{% extends 'main/base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <div class="d-flex justify-content-between mb-3">
        <a href="{% url 'home' %}" class="btn btn-outline-primary"><i class="bi bi-arrow-left"></i> На главную</a>
    </div>

    <div class="glass-card p-3" style="background: #f0f7ff;">
        <h3 class="text-center mb-4">❄️ Полная схема холодильного отделения</h3>
        <div style="position: relative; width: 100%; background: #d9e9ff; border-radius: 20px; padding: 20px; border: 2px solid #4a90e2; overflow-x: auto;">
            <div style="position: relative; height: 700px; min-width: 1400px;">
                {% for element in elements %}
                    <a href="{% url 'element_detail' element.id %}" 
                       class="schema-element" 
                       style="position: absolute; left: {{ element.pos_x }}px; top: {{ element.pos_y }}px; width: 75px; height: 45px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 2px solid #0033a0; font-size: 12px; text-decoration: none; color: #0033a0;">
                        {{ element.name }}
                        <span class="val" style="margin-left: 5px;">{{ element.temperature }}°</span>
                    </a>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
