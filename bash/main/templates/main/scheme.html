<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Параметры Аппаратов | 40/2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0"><i class="bi bi-table me-2"></i> Холодильное отделение: Контроль параметров</h5>
            <a href="{% url 'index' %}" class="btn btn-outline-light btn-sm">На главную</a>
        </div>
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Позиция</th>
                        <th>Наименование аппарата</th>
                        <th>Давление (кгс/см²)</th>
                        <th>Температура (°C)</th>
                        <th class="text-center">Настройка</th>
                    </tr>
                </thead>
                <tbody>
                    {% for app in apparatus_list %}
                    <tr>
                        <td><span class="badge bg-secondary">{{ app.position }}</span></td>
                        <td>{{ app.name }}</td>
                        <td><strong class="text-primary">{{ app.pressure }}</strong></td>
                        <td><strong class="text-danger">{{ app.temperature }}</strong></td>
                        <td class="text-center">
                            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#edit{{ app.id }}">
                                <i class="bi bi-sliders"></i>
                            </button>
                        </td>
                    </tr>

                    <div class="modal fade" id="edit{{ app.id }}" tabindex="-1">
                        <div class="modal-dialog modal-sm">
                            <div class="modal-content shadow">
                                <form action="{% url 'update_params' %}" method="POST">
                                    {% csrf_token %}
                                    <input type="hidden" name="app_id" value="{{ app.id }}">
                                    <div class="modal-header bg-light">
                                        <h6 class="modal-title">Параметры {{ app.position }}</h6>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body text-start">
                                        <div class="mb-3">
                                            <label class="form-label small fw-bold">Давление</label>
                                            <input type="number" step="0.1" name="pressure" class="form-control" value="{{ app.pressure }}">
                                        </div>
                                        <div class="mb-3">
                                            <label class="form-label small fw-bold">Температура</label>
                                            <input type="number" step="0.1" name="temperature" class="form-control" value="{{ app.temperature }}">
                                        </div>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="submit" class="btn btn-success w-100">Сохранить</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
